gm:
  token: "gm-token"
  serv_addr: "127.0.0.1:7001"
  strategy_id: "strategy-id"
  mode: live
feishu:
  app_id: "cli_test"
  app_secret: "secret-test"
  receive_id_type: chat_id
  receive_id: "oc_test"
  token_refresh_margin_seconds: 300
  max_attempts: 3
  retry_backoff_seconds: [0, 0, 0]
watchlist:
  - symbol: SHSE.600519
    name: "贵州茅台"
    active: true
    rule_profile: loose
rules:
  loose:
    price_window_seconds: 30
    price_return_threshold_pct: 5.0
    momentum_impulse_seconds: 10
    momentum_baseline_seconds: 60
    momentum_z_threshold: 8.0
    orderbook_window_seconds: 30
    orderbook_min_consecutive_ticks: 2
    orderbook_cancel_ratio_threshold: 0.95
    orderbook_imbalance_ratio_threshold: 0.95
    orderbook_standalone_min_severity: high
    min_ticks_short_window: 3
    min_ticks_baseline_window: 5
    cooldown_seconds: 180
    severity_thresholds:
      warning: {price_return_pct: 5.0, momentum_z: 8.0, orderbook_cancel_ratio: 0.95, orderbook_imbalance_ratio: 0.95}
      high: {price_return_pct: 6.0, momentum_z: 9.0, orderbook_cancel_ratio: 0.98, orderbook_imbalance_ratio: 0.98}
      critical: {price_return_pct: 7.0, momentum_z: 10.0, orderbook_cancel_ratio: 0.99, orderbook_imbalance_ratio: 0.99}
    ignored_sessions: []
audit:
  dir: var/audit-test-variant
  write_tick_summaries: true
